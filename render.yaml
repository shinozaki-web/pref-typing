services:
  - type: web
    name: pref-typing-server
    runtime: node
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: FRONTEND_URL
        value: https://pref-typing.onrender.com

  - type: web
    name: pref-typing
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://pref-typing-server.onrender.com
